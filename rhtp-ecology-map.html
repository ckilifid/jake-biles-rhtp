<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Montana RHTP Ecology Map — Jake Biles</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #fff;
    color: #000;
    font-family: 'Caveat', cursive;
    padding: 22px 20px 28px 20px;
  }
  .headline {
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    max-width: 900px;
    margin: 0 auto 16px auto;
    line-height: 1.55;
    padding-bottom: 12px;
    border-bottom: 2px solid #000;
  }
  #diagram {
    display: block;
    margin: 0 auto;
    width: 100%;
    max-width: 1100px;
    height: auto;
  }
  @media print {
    @page { size: 11in 8.5in landscape; margin: 0.35in; }
    body { padding: 0; }
    .headline { font-size: 15px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1.5px solid #000; }
  }
</style>
</head>
<body>

<div class="headline">
  The single most important node: Big Sky Care Connect.<br>
  Every Initiative 5.1 technology dollar flows through or alongside it.
</div>

<svg id="diagram" viewBox="0 0 1100 880">
</svg>

<script>
(function() {
  var READY = false;
  function boot() {
    if (typeof rough === 'undefined') { setTimeout(boot, 80); return; }
    document.fonts.ready.then(draw);
  }
  boot();

  function draw() {
    var svg = document.getElementById('diagram');
    var rc = rough.svg(svg);
    var NS = 'http://www.w3.org/2000/svg';

    function add(el) { svg.appendChild(el); return el; }

    function box(x, y, w, h, opts) {
      return add(rc.rectangle(x, y, w, h, Object.assign({
        roughness: 1.6,
        stroke: '#000',
        strokeWidth: 1.6,
        fill: '#fff',
        fillStyle: 'solid'
      }, opts || {})));
    }

    function heavyBox(x, y, w, h) {
      // outer ring
      add(rc.rectangle(x - 5, y - 5, w + 10, h + 10, {
        roughness: 2.4, stroke: '#000', strokeWidth: 3,
        fill: '#fff', fillStyle: 'solid'
      }));
      // inner ring
      add(rc.rectangle(x, y, w, h, {
        roughness: 1.8, stroke: '#000', strokeWidth: 2,
        fill: '#fff', fillStyle: 'solid'
      }));
    }

    function arrow(x1, y1, x2, y2, opts) {
      var o = Object.assign({ roughness: 1.2, stroke: '#000', strokeWidth: 1.6 }, opts || {});
      add(rc.line(x1, y1, x2, y2, o));
      var a = Math.atan2(y2 - y1, x2 - x1), L = 13, s = 0.38;
      var tip = Object.assign({ roughness: 0.8, stroke: '#000', strokeWidth: 1.6 }, opts || {});
      add(rc.line(x2, y2, x2 - L * Math.cos(a - s), y2 - L * Math.sin(a - s), tip));
      add(rc.line(x2, y2, x2 - L * Math.cos(a + s), y2 - L * Math.sin(a + s), tip));
    }

    function dash(x1, y1, x2, y2) {
      add(rc.line(x1, y1, x2, y2, {
        roughness: 0.5, stroke: '#555', strokeWidth: 1.1, strokeLineDash: [7, 5]
      }));
    }

    function t(x, y, str, sz, wt, anchor) {
      var el = document.createElementNS(NS, 'text');
      el.setAttribute('x', x);
      el.setAttribute('y', y);
      el.setAttribute('text-anchor', anchor || 'middle');
      el.setAttribute('font-family', "Caveat, cursive");
      el.setAttribute('font-size', sz || 13);
      el.setAttribute('font-weight', wt || 'normal');
      el.setAttribute('fill', '#000');
      el.textContent = str;
      svg.appendChild(el);
    }

    // ── Column separators ──────────────────────────────────────────
    add(rc.line(352, 12, 352, 800, {
      roughness: 0.4, stroke: '#ccc', strokeWidth: 1, strokeLineDash: [5, 5]
    }));
    add(rc.line(742, 12, 742, 800, {
      roughness: 0.4, stroke: '#ccc', strokeWidth: 1, strokeLineDash: [5, 5]
    }));

    // ── Column headers ─────────────────────────────────────────────
    t(176, 26, 'Federal Money + Policy Tailwind', 14, '700');
    t(547, 26, 'Allocation Stack', 14, '700');
    t(921, 26, 'Capital Ecosystem', 14, '700');

    // ══════════════════════════════════════════════════════════════
    // DRAW ORDER: arrows first, then boxes+text (boxes have white fill)
    // ══════════════════════════════════════════════════════════════

    // Cross-column arrows (drawn before boxes)
    // CMS → DPHHS
    arrow(308, 84, 382, 84);
    // Sheehy → Initiative 5 area
    arrow(308, 260, 400, 175);

    // Center column vertical flow arrows
    arrow(547, 120, 547, 148);   // DPHHS → Init5
    arrow(547, 203, 547, 232);   // Init5 → BSCC
    arrow(547, 392, 547, 422);   // BSCC → Init5.1
    arrow(547, 522, 547, 550);   // Init5.1 → CAPTN

    // VC cluster → BSCC dashed credentialing line
    dash(756, 240, 742, 360);

    // ══ LEFT COLUMN ════════════════════════════════════════════════

    // CMS / RHTP node
    box(28, 48, 280, 73);
    t(168, 72, 'CMS / RHTP', 15, '700');
    t(168, 91, '$233M Year One', 13, '600');
    t(168, 109, '→ Montana DPHHS', 13, '600');

    // Sheehy node
    box(28, 188, 280, 140);
    t(168, 213, 'Senator Sheehy', 15, '700');
    t(168, 232, 'Critical Access for Veterans Care Act', 11, 'normal');
    t(168, 248, '— routes VA patients to rural hospitals', 11, 'normal');
    t(168, 270, 'CONNECT for Health Act', 11, 'normal');
    t(168, 286, '— expands telehealth, more data to manage', 11, 'normal');
    t(168, 312, '↳ both bills feed DPHHS / Initiative 5 demand', 11, '600');

    // ══ CENTER COLUMN ══════════════════════════════════════════════

    // Montana DPHHS
    box(382, 48, 330, 72);
    t(547, 75, 'Montana DPHHS', 16, '700');
    t(547, 95, 'Allocator — five initiatives', 12, 'normal');
    t(547, 112, 'Montana: 4th-highest state allocation nationally', 11, 'normal');

    // Initiative 5
    box(400, 148, 295, 55);
    t(547, 172, 'Initiative 5 — Technology Innovation', 13, '700');
    t(547, 190, '$33M allocated', 12, 'normal');

    // ── BSCC: LARGEST, MOST DOMINANT ──────────────────────────────
    heavyBox(355, 232, 384, 160);
    t(547, 265, 'BIG SKY CARE CONNECT', 25, '700');
    t(547, 293, '(BSCC)', 19, '700');
    t(547, 318, 'State-designated Health Information Exchange', 11, '600');
    t(547, 337, 'Q2 2026: Statement of Work finalizing with DPHHS now', 11, '600');
    t(547, 358, '← This is the gate. Every Initiative 5.1 dollar', 12, '700');
    t(547, 375, '   flows through or alongside it. →', 12, '700');

    // Initiative 5.1
    box(388, 422, 318, 100);
    t(547, 447, 'Initiative 5.1 — Data Usability', 14, '700');
    t(547, 466, '"Provider-facing tools to translate analytics', 11, 'normal');
    t(547, 482, 'into actionable insights at point of care"', 11, 'normal');
    t(547, 502, 'Named near-term use case: behavioral health bed registry', 10, '600');
    t(547, 516, 'CAH transfer optimization, rural intervention monitoring', 10, 'normal');

    // CAPTN
    box(398, 550, 298, 88);
    t(547, 578, 'CAPTN', 22, '700');
    t(547, 601, 'Decisioning intelligence layer', 13, 'normal');
    t(547, 619, 'sits on top of BSCC + HIE data', 12, 'normal');
    t(547, 636, 'makes the EHR investment actionable at point of care', 11, 'normal');

    // ══ RIGHT COLUMN ═══════════════════════════════════════════════

    box(756, 108, 308, 48);
    t(910, 137, 'Next Frontier Capital', 14, '600');

    box(756, 182, 308, 48);
    t(910, 211, 'Two Bear Capital', 14, '600');

    box(756, 256, 308, 48);
    t(910, 285, 'Frontier Angels', 14, '600');

    t(910, 330, '"Local credentialing +', 12, 'normal');
    t(910, 348, 'relationship access —', 12, 'normal');
    t(910, 366, 'the bridge to the', 12, 'normal');
    t(910, 384, 'procurement conversation"', 12, 'normal');

    // ══ CALLOUT: Questions Worth Testing ══════════════════════════

    box(752, 445, 326, 303, { roughness: 2.2, strokeWidth: 2 });
    t(915, 468, '— Questions Worth Testing —', 13, '700');

    // Q1
    t(760, 492, '1. Has CAPTN been in conversation with', 11, 'normal', 'start');
    t(760, 508, '   Big Sky Care Connect?', 11, 'normal', 'start');
    t(760, 524, '   Q2 2026 SOW finalizing now.', 11, '600', 'start');

    // Q2
    t(760, 545, '2. Is DPHHS open to a third-party decisioning', 11, 'normal', 'start');
    t(760, 561, '   layer on top of the HIE, or building in-house?', 11, 'normal', 'start');

    // Q3
    t(760, 582, '3. What is the RFP timeline for', 11, 'normal', 'start');
    t(760, 598, '   Initiative 5.1 specifically?', 11, 'normal', 'start');

    // Q4
    t(760, 619, '4. eMACS fully replaced — RFP closed Feb 2026.', 11, 'normal', 'start');
    t(760, 635, '   State called it "a bottleneck for efficient', 11, 'normal', 'start');
    t(760, 651, '   government operations." Is there a CAPTN', 11, 'normal', 'start');
    t(760, 667, '   positioning angle during the transition?', 11, '600', 'start');

    t(760, 700, '   [ RFP DOA-2026-0230AL closed Feb 24, 2026.', 9, 'normal', 'start');
    t(760, 714, '     State currently evaluating or has selected vendor. ]', 9, 'normal', 'start');

    // ══ RFP CLOCK ══════════════════════════════════════════════════

    box(28, 800, 360, 62, { roughness: 2, strokeWidth: 2 });
    t(208, 826, '~8 competitive RFPs by September 2026.', 14, '700');
    t(208, 849, 'Window is open now.', 15, '700');

  }
})();
</script>
</body>
</html>
